services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      FLASK_ENV: development
    command: python run.py

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - server
